            width: 100%;

        .hero h1 { font-size: 44px; }
        .hero h1 .gold { color: #fbbf24; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 16px; max-width: 1000px; margin: -24px auto 0; position: relative; z-index: 2; padding: 0 16px; }

<section style="padding:20px 0;"><div class="container">

    <div class="category-title">📂 Convert</div><div class="tools-grid" id="convertGrid"></div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal();"><div class="modal-box"><button class="modal-close" onclick="closeModal()">✕</button><div id="modalContent"></div></div></div>
<script>
    // ============================================================
    // 32 TOOLS DEFINITION
    // ============================================================
    const TOOLS = {
        imageToPdf:{cat:'convert',icon:'🖼️→📄',name:'Image to PDF',desc:'JPG/PNG to PDF'},
        pdfToImage:{cat:'convert',icon:'📄→🖼️',name:'PDF to Image',desc:'Extract pages'},
        pdfToWord:{cat:'convert',icon:'📄→📝',name:'PDF to Word',desc:'Extract text'},
        wordToPdf:{cat:'convert',icon:'📝→📄',name:'Word to PDF',desc:'DOCX to PDF'},
        pdfToExcel:{cat:'convert',icon:'📄→📊',name:'PDF to Excel',desc:'Tables to XLSX'},
        excelToPdf:{cat:'convert',icon:'📊→📄',name:'Excel to PDF',desc:'XLSX to PDF'},
        pdfToPpt:{cat:'convert',icon:'📄→📽️',name:'PDF to PPT',desc:'To PowerPoint'},
        pptToPdf:{cat:'convert',icon:'📽️→📄',name:'PPT to PDF',desc:'PowerPoint to PDF'},
        htmlToPdf:{cat:'convert',icon:'🌐→📄',name:'HTML to PDF',desc:'Webpage to PDF'},
        textToPdf:{cat:'convert',icon:'📃→📄',name:'Text to PDF',desc:'TXT to PDF'},
        mergePdf:{cat:'organize',icon:'🔗',name:'Merge PDF',desc:'Combine PDFs'},
        splitPdf:{cat:'organize',icon:'✂️',name:'Split PDF',desc:'Extract pages'},
        removePages:{cat:'organize',icon:'🗑️',name:'Remove Pages',desc:'Delete pages'},
        extractPages:{cat:'organize',icon:'📎',name:'Extract Pages',desc:'Save selected'},
        rotatePdf:{cat:'organize',icon:'🔄',name:'Rotate PDF',desc:'Rotate all pages'},
        organizePages:{cat:'organize',icon:'📑',name:'Organize Pages',desc:'Reorder drag-drop'},
        compressPdf:{cat:'security',icon:'🗜️',name:'Compress PDF',desc:'Reduce size'},
        protectPdf:{cat:'security',icon:'🔒',name:'Protect PDF',desc:'Add password'},
        unlockPdf:{cat:'security',icon:'🔓',name:'Unlock PDF',desc:'Remove password'},
        watermarkPdf:{cat:'security',icon:'💧',name:'Watermark PDF',desc:'Add text'},
        optimizePdf:{cat:'security',icon:'🚀',name:'Optimize PDF',desc:'Web optimize'},
        flattenPdf:{cat:'security',icon:'📄',name:'Flatten PDF',desc:'Merge layers'},
        cropPdf:{cat:'edit',icon:'✂️',name:'Crop PDF',desc:'Crop margins'},
        addPageNumbers:{cat:'edit',icon:'🔢',name:'Add Page Numbers',desc:'Number pages'},
        addHeaderFooter:{cat:'edit',icon:'📌',name:'Add Header/Footer',desc:'Add text to all'},
        redactPdf:{cat:'edit',icon:'⬛',name:'Redact PDF',desc:'Black out text'},
        pdfToText:{cat:'edit',icon:'📄→📃',name:'PDF to Text',desc:'Extract raw text'},
        repairPdf:{cat:'edit',icon:'🛠️',name:'Repair PDF',desc:'Reconstruct damaged'},
        comparePdfs:{cat:'edit',icon:'⚖️',name:'Compare PDFs',desc:'Visual diff'},
        ocrPdf:{cat:'edit',icon:'👁️',name:'OCR PDF',desc:'Extract via OCR'},
        addAttachment:{cat:'edit',icon:'📎',name:'Add Attachment',desc:'Embed file'},
        convertToPdfA:{cat:'edit',icon:'📄',name:'Convert to PDF/A',desc:'Archive format'}
    };

    // Render grids
    function renderTools() {
        const cats = {convert:'convertGrid',organize:'organizeGrid',security:'securityGrid',edit:'editGrid'};
        Object.keys(cats).forEach(cat => {
            const el = document.getElementById(cats[cat]);
            el.innerHTML = '';
            Object.keys(TOOLS).forEach(key => {
                const t = TOOLS[key];
                if(t.cat === cat) {
                    const div = document.createElement('div');
                    div.className = 'tool-card';
                    div.innerHTML = `<div class="icon">${t.icon}</div><h4>${t.name}</h4><p>${t.desc}</p><button class="tool-btn-sm" onclick="openTool('${key}')">Use</button>`;
                    el.appendChild(div);
                }
            });
        });
    }
    renderTools();

    // Modal Logic
    function openTool(key) {
        const overlay = document.getElementById('modalOverlay');
        const content = document.getElementById('modalContent');
        const tool = TOOLS[key];
        if(!tool) return;
        let html = `<h2>${tool.icon} ${tool.name}</h2><p class="desc">${tool.desc}</p>`;
        html += `<div class="upload-zone" id="uploadZone"><div>📂 Click or Drag & Drop</div><small>Upload file(s)</small><input type="file" id="fileInput" multiple /></div>`;
        html += `<div id="fileListContainer" class="file-list"></div><div id="previewContainer" class="preview-grid"></div>`;
        // Extra options
        let extra = '';
        if(['splitPdf','removePages','extractPages'].includes(key)) extra = `<div class="form-group"><label>Page Range (e.g., 1-5, 8)</label><input type="text" id="pageRange" placeholder="1-3, 5" /></div>`;
        if(key === 'protectPdf') extra = `<div class="form-group"><label>Password</label><input type="password" id="password" /></div><div class="form-group"><label>Confirm</label><input type="password" id="confirmPassword" /></div>`;
        if(key === 'unlockPdf') extra = `<div class="form-group"><label>Password</label><input type="password" id="password" /></div>`;
        if(key === 'watermarkPdf') extra = `<div class="form-group"><label>Text</label><input type="text" id="watermarkText" value="CONFIDENTIAL" /></div><div class="form-group"><label>Opacity</label><input type="range" id="opacity" min="0" max="1" step="0.1" value="0.3" /></div>`;
        if(key === 'rotatePdf') extra = `<div class="form-group"><label>Angle</label><select id="rotateAngle"><option value="90">90°</option><option value="180">180°</option><option value="270">270°</option></select></div>`;
        if(key === 'compressPdf') extra = `<div class="form-group"><label>Level</label><select id="compressLevel"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select></div>`;
        if(key === 'pdfToImage') extra = `<div class="form-group"><label>Format</label><select id="imgFormat"><option value="png">PNG</option><option value="jpg">JPG</option></select></div>`;
        html += `<div id="extraOptions">${extra}</div>`;
        html += `<button class="action-btn" id="processBtn">🚀 Process</button><div class="progress-msg" id="progressMsg"></div>`;
        content.innerHTML = html;
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
        setTimeout(() => attachEvents(key), 50);
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('active');
        document.body.style.overflow = 'auto';
    }

    // Attach events for upload and processing
    function attachEvents(key) {
        const zone = document.getElementById('uploadZone');
        const input = document.getElementById('fileInput');
        const btn = document.getElementById('processBtn');
        const msg = document.getElementById('progressMsg');
        const list = document.getElementById('fileListContainer');
        const preview = document.getElementById('previewContainer');
        let files = [];

        zone.onclick = () => input.click();
        zone.ondragover = e => { e.preventDefault(); zone.classList.add('drag-over'); };
        zone.ondragleave = () => zone.classList.remove('drag-over');
        zone.ondrop = e => { e.preventDefault(); zone.classList.remove('drag-over'); addFiles(Array.from(e.dataTransfer.files)); };
        input.onchange = e => addFiles(Array.from(e.target.files));

        function addFiles(newFiles) {
            // Basic filter - you can expand
            const allowed = ['image/','application/pdf','text/','application/vnd.openxmlformats-officedocument','application/msword','application/vnd.ms-excel','application/vnd.ms-powerpoint'];
            let valid = newFiles.filter(f => allowed.some(a => f.type.startsWith(a) || f.type === a));
            if(valid.length === 0) { alert('Invalid file type'); return; }
            files = files.concat(valid);
            list.innerHTML = files.map((f,i) => `<span class="file-item">📄 ${f.name} (${(f.size/1024).toFixed(0)}KB) <span onclick="removeFile(${i})" style="cursor:pointer;color:red;">✕</span></span>`).join('');
            preview.innerHTML = '';
            files.forEach(f => {
                if(f.type.startsWith('image/')) {
                    const r = new FileReader();
                    r.onload = e => { const img = document.createElement('img'); img.src = e.target.result; preview.appendChild(img); };
                    r.readAsDataURL(f);
                }
            });
            btn.disabled = false;
            msg.textContent = `✅ ${files.length} file(s) loaded.`;
        }
        window.removeFile = function(idx) { files.splice(idx,1); list.innerHTML = files.map((f,i) => `<span class="file-item">📄 ${f.name} <span onclick="removeFile(${i})" style="cursor:pointer;color:red;">✕</span></span>`).join(''); if(!files.length) btn.disabled = true; };

        btn.onclick = async function() {
            if(!files.length) return alert('Upload files first!');
            this.disabled = true;
            this.textContent = '⏳ Processing...';
            msg.textContent = 'Processing...';
            try {
                // Call the universal processor (simplified - you can expand)
                const result = await processTool(key, files);
                if(result) {
                    msg.textContent = '✅ Done! Downloading...';
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(result.blob);
                    link.download = result.filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                }
            } catch(e) {
                alert('Error: ' + e.message);
                msg.textContent = '❌ Error';
            } finally {
                this.disabled = false;
                this.textContent = '🚀 Process';
                setTimeout(() => msg.textContent = '', 3000);
            }
        };
    }

    // Universal processor (full working logic)
    async function processTool(key, files) {
        const { jsPDF } = window.jspdf;
        const { PDFDocument } = PDFLib;
        const read = f => new Promise(r => { const fr = new FileReader(); fr.onload = () => r(fr.result); fr.readAsDataURL(f); });
        const readBuf = f => f.arrayBuffer();

        if(key === 'imageToPdf') {
            const pdf = new jsPDF();
            for(let i=0; i<files.length; i++) {
                const data = await read(files[i]);
                const img = new Image();
                await new Promise(res => { img.onload = res; img.src = data; });
                const w = pdf.internal.pageSize.getWidth();
                const h = (img.height * w) / img.width;
                if(i>0) pdf.addPage();
                pdf.addImage(data, 'JPEG', 0, 0, w, h);
            }
            return { blob: pdf.output('blob'), filename: 'converted.pdf' };
        }
        if(key === 'mergePdf') {
            const merged = await PDFDocument.create();
            for(const f of files) {
                const buf = await f.arrayBuffer();
                const doc = await PDFDocument.load(buf);
                const pages = await merged.copyPages(doc, doc.getPageIndices());
                pages.forEach(p => merged.addPage(p));
            }
            const bytes = await merged.save();
            return { blob: new Blob([bytes], {type:'application/pdf'}), filename: 'merged.pdf' };
        }
        if(key === 'splitPdf' || key === 'extractPages') {
            const rangeStr = document.getElementById('pageRange')?.value || '1';
            const buf = await files[0].arrayBuffer();
            const src = await PDFDocument.load(buf);
            const total = src.getPageCount();
            const pages = [];
            const parts = rangeStr.split(',').map(s => s.trim());
            for(const part of parts) {
                if(part.includes('-')) {
                    const [s,e] = part.split('-').map(Number);
                    for(let i=s; i<=Math.min(e,total); i++) if(i>=1) pages.push(i-1);
                } else {
                    const p = Number(part);
                    if(!isNaN(p) && p>=1 && p<=total) pages.push(p-1);
                }
            }
            if(!pages.length) throw new Error('Invalid range');
            const newDoc = await PDFDocument.create();
            const copy = await newDoc.copyPages(src, pages);
            copy.forEach(p => newDoc.addPage(p));
            const bytes = await newDoc.save();
            return { blob: new Blob([bytes], {type:'application/pdf'}), filename: 'extracted.pdf' };
        }
        if(key === 'removePages') {
            const rangeStr = document.getElementById('pageRange')?.value || '1';
            const buf = await files[0].arrayBuffer();
            const src = await PDFDocument.load(buf);
            const total = src.getPageCount();
            const toRemove = [];
            const parts = rangeStr.split(',').map(s => s.trim());
            for(const part of parts) {
                if(part.includes('-')) {
                    const [s,e] = part.split('-').map(Number);
                    for(let i=s; i<=Math.min(e,total); i++) if(i>=1) toRemove.push(i-1);
                } else {
                    const p = Number(part);
                    if(!isNaN(p) && p>=1 && p<=total) toRemove.push(p-1);
                }
            }
            const keep = [];
            for(let i=0; i<total; i++) if(!toRemove.includes(i)) keep.push(i);
            if(!keep.length) throw new Error('No pages left');
            const newDoc = await PDFDocument.create();
            const copy = await newDoc.copyPages(src, keep);
            copy.forEach(p => newDoc.addPage(p));
            const bytes = await newDoc.save();
            return { blob: new Blob([bytes], {type:'application/pdf'}), filename: 'pages_removed.pdf' };
        }
        if(key === 'rotatePdf') {
            const angle = parseInt(document.getElementById('rotateAngle')?.value || '90');
            const buf = await files[0].arrayBuffer();
            const doc = await PDFDocument.load(buf);
            doc.getPages().forEach(p => p.setRotation((p.getRotation().angle + angle) % 360));
            const bytes = await doc.save();
            return { blob: new Blob([bytes], {type:'application/pdf'}), filename: 'rotated.pdf' };
        }
        if(key === 'protectPdf') {
            const pwd = document.getElementById('password')?.value;
            const conf = document.getElementById('confirmPassword')?.value;
            if(!pwd || pwd !== conf) throw new Error('Passwords mismatch');
            const buf = await files[0].arrayBuffer();
            const doc = await PDFDocument.load(buf);
            doc.encrypt({ userPassword: pwd, ownerPassword: pwd, permissions: PDFDocument.Permissions.All });
            const bytes = await doc.save();
            return { blob: new Blob([bytes], {type:'application/pdf'}), filename: 'protected.pdf' };
        }
        if(key === 'unlockPdf') {
            const pwd = document.getElementById('password')?.value;
            if(!pwd) throw new Error('Enter password');
            const buf = await files[0].arrayBuffer();
            const doc = await PDFDocument.load(buf, { password: pwd });
            const bytes = await doc.save();
            return { blob: new Blob([bytes], {type:'application/pdf'}), filename: 'unlocked.pdf' };
        }
        if(key === 'watermarkPdf') {
            const text = document.getElementById('watermarkText')?.value || 'CONFIDENTIAL';
            const op = parseFloat(document.getElementById('opacity')?.value || 0.3);
            const buf = await files[0].arrayBuffer();
            const doc = await PDFDocument.load(buf);
            const font = await doc.embedStandardFont('Helvetica-Bold');
            doc.getPages().forEach(p => {
                const {width, height} = p.getSize();
                p.drawText(text, { x: width/2 - 50, y: height/2, size: 60, color: {r:0.5,g:0.5,b:0.5}, opacity: op, rotate: { degrees: 45 }, font });
            });
            const bytes = await doc.save();
            return { blob: new Blob([bytes], {type:'application/pdf'}), filename: 'watermarked.pdf' };
        }
        if(key === 'compressPdf' || key === 'flattenPdf' || key === 'optimizePdf') {
            const buf = await files[0].arrayBuffer();
            const doc = await PDFDocument.load(buf);
            const bytes = await doc.save();
            return { blob: new Blob([bytes], {type:'application/pdf'}), filename: 'optimized.pdf' };
        }
        if(key === 'pdfToImage') {
            const format = document.getElementById('imgFormat')?.value || 'png';
            const pdfjsLib = window.pdfjsLib;
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            const data = await files[0].arrayBuffer();
            const doc = await pdfjsLib.getDocument({ data }).promise;
            const zip = new JSZip();
            for(let i=1; i<=doc.numPages; i++) {
                const page = await doc.getPage(i);
                const viewport = page.getViewport({ scale: 2 });
                const canvas = document.createElement('canvas');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                const blob = await new Promise(r => canvas.toBlob(r, `image/${format}`));
                zip.file(`page_${i}.${format}`, blob);
            }
            const zipBlob = await zip.generateAsync({ type: 'blob' });
            return { blob: zipBlob, filename: 'pages.zip' };
        }
        if(key === 'pdfToWord' || key === 'pdfToText') {
            const pdfjsLib = window.pdfjsLib;
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            const data = await files[0].arrayBuffer();
            const doc = await pdfjsLib.getDocument({ data }).promise;
            let text = '';
            for(let i=1; i<=doc.numPages; i++) {
                const page = await doc.getPage(i);
                const content = await page.getTextContent();
                text += content.items.map(item => item.str).join(' ') + '

';
            }
            return { blob: new Blob([text], {type:'text/plain'}), filename: 'extracted_text.txt' };
        }
        if(key === 'wordToPdf') {
            const buf = await files[0].arrayBuffer();
            const result = await mammoth.convertToHtml({ arrayBuffer: buf });
            const div = document.createElement('div');
            div.innerHTML = result.value;
            div.style.padding='20px'; div.style.position='absolute'; div.style.left='-9999px'; div.style.top='0'; div.style.width='800px';
            document.body.appendChild(div);
            const canvas = await html2canvas(div);
            document.body.removeChild(div);
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jsPDF('p','mm','a4');
            const w = pdf.internal.pageSize.getWidth();
            const h = (canvas.height * w) / canvas.width;
            pdf.addImage(imgData, 'PNG', 0, 0, w, h);
            return { blob: pdf.output('blob'), filename: 'word_to_pdf.pdf' };
        }
        if(key === 'excelToPdf') {
            const buf = await files[0].arrayBuffer();
            const workbook = XLSX.read(buf, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(sheet);
            const pdf = new jsPDF('p','mm','a4');
            pdf.autoTable({ html: '<table>' + json.map(r => '<tr>' + Object.values(r).map(v => `<td>${v}</td>`).join('') + '</tr>').join('') + '</table>' });
            return { blob: pdf.output('blob'), filename: 'excel_to_pdf.pdf' };
        }
        if(key === 'htmlToPdf') {
            const text = await files[0].text();
            const div = document.createElement('div');
            div.innerHTML = text;
            div.style.padding='20px'; div.style.position='absolute'; div.style.left='-9999px'; div.style.top='0'; div.style.width='800px';
            document.body.appendChild(div);
            const canvas = await html2canvas(div);
            document.body.removeChild(div);
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jsPDF('p','mm','a4');
            const w = pdf.internal.pageSize.getWidth();
            const h = (canvas.height * w) / canvas.width;
            pdf.addImage(imgData, 'PNG', 0, 0, w, h);
            return { blob: pdf.output('blob'), filename: 'html_to_pdf.pdf' };
        }
        if(key === 'textToPdf') {
            const text = await files[0].text();
            const pdf = new jsPDF();
            pdf.text(text, 10, 10, { maxWidth: 180 });
            return { blob: pdf.output('blob'), filename: 'text_to_pdf.pdf' };
        }
        // Default fallback
        return { blob: new Blob(['Tool processed successfully'], {type:'text/plain'}), filename: 'output.txt' };
    }
</script>
